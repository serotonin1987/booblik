name: FastAPI CI

on:
  push:
    branches: [ *]
  pull_request:
    branches: [ * ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt


  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt

      - name: Запуск тестов
        run: |
          pytest


  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
        run:
          mkdir -p ~/.starting
          cp -r . ~/.starging