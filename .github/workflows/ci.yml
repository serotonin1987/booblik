name: FastAPI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      name: Клонируем репозиторий
    - uses: actions/checkout@v2
    - name: Установка Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9
    - name: Установка зависимостей

test:
  runs-on: ubuntu-latest
  needs: build
  steps:
  - name: Запуск тестов
    run: |
      pytest 